name: zods-rs-win
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      # Core libs (OS-agnostic)
      - numpy==2.1.1
      - scipy==1.14.1
      - pillow==10.4.0
      - matplotlib==3.9.2
      - seaborn==0.13.2
      - pandas==2.2.3
      - tqdm==4.66.5
      - scikit-image==0.24.0
      - scikit-learn==1.5.2
      - opencv-python==4.10.0.84
      - pyyaml==6.0.2
      - requests==2.32.3
      - yacs==0.1.8
      - omegaconf==2.3.0
      - hydra-core==1.3.2
      - pytorch-lightning==2.1.0
      - jsonargparse==4.33.2
      - rich==13.9.2
      - termcolor==2.4.0
      - safetensors
      - transformers>=4.44.0
      - timm==0.4.12
      - pot==0.9.5
      # Note:
      # - PyTorch/torchvision 将单独安装（见 README/中文文档），以匹配本机 CUDA/CPU。
      # - 可选组件（如 pycocotools/lvis/mmengine 等）默认不在此文件中，以提升 Windows 兼容性。

